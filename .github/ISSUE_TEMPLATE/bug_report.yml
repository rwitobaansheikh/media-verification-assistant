name: Bug Report
description: Report incorrect, broken, or surprising behavior.
title: "[Bug]: "
labels: ["needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the smallest steps that reproduce the issue.
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Python/Node versions, commit SHA, or other relevant details.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety Check
      options:
        - label: This issue does not include private media, secrets, personal information, or exploit details.
          required: true

